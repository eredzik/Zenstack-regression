services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: zenstack_compare_demo
    tmpfs:
      - /var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U demo -d zenstack_compare_demo" ]
      interval: 2s
      timeout: 5s
      retries: 10
